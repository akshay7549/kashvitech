{% load static %}

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar fixed-top" id="navbar">
<div class="container">

    <!-- LOGO -->
    <a class="navbar-brand d-flex align-items-center fw-bold text-warning"
       href="{% url 'main:home' %}">
        <img src="{% static 'images/logo.png' %}" width="40" class="me-2 rounded-circle shadow">
        KashviTech
    </a>

    <!-- TOGGLE -->
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        ☰
    </button>

    <div class="collapse navbar-collapse" id="nav">

        <!-- LINKS -->
        <ul class="navbar-nav mx-auto text-center">

            <li class="nav-item">
                <a class="nav-link nav-hover {% if request.path == '/' %}active{% endif %}"
                   href="{% url 'main:home' %}">
                   🏠 Home
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link nav-hover {% if 'about' in request.path %}active{% endif %}"
                   href="{% url 'main:about' %}">
                   ℹ️ About
                </a>
            </li>

            <!-- SERVICES -->
            <li class="nav-item dropdown position-static">
                <a class="nav-link dropdown-toggle nav-hover {% if 'services' in request.path %}active{% endif %}"
                   href="{% url 'services:services' %}"
                   data-bs-toggle="dropdown">
                   🚀 Services
                </a>

                <!-- MEGA MENU -->
                <div class="dropdown-menu w-100 mt-3 p-4 border-0 shadow-lg mega-menu animate-dropdown">

                    <div class="row text-start">

                        <div class="col-md-3">
                            <h6 class="text-warning">Marketing</h6>
                            <a class="dropdown-item" href="{% url 'services:services' %}#seo">SEO</a>
                            <a class="dropdown-item" href="{% url 'services:services' %}#lead">Lead Gen</a>
                        </div>

                        <div class="col-md-3">
                            <h6 class="text-warning">Ads</h6>
                            <a class="dropdown-item" href="{% url 'services:services' %}#google">Google Ads</a>
                            <a class="dropdown-item" href="{% url 'services:services' %}#facebook">Facebook Ads</a>
                        </div>

                        <div class="col-md-3">
                            <h6 class="text-warning">Development</h6>
                            <a class="dropdown-item" href="{% url 'services:services' %}#web">Web Dev</a>
                            <a class="dropdown-item" href="{% url 'services:services' %}#ecommerce">E-commerce</a>
                        </div>

                        <div class="col-md-3">
                            <h6 class="text-warning">Design</h6>
                            <a class="dropdown-item" href="{% url 'services:services' %}#uiux">UI/UX</a>
                        </div>

                    </div>

                </div>
            </li>

            <li class="nav-item">
                <a class="nav-link nav-hover {% if 'contact' in request.path %}active{% endif %}"
                   href="{% url 'contact:contact' %}">
                   📞 Contact
                </a>
            </li>

        </ul>

        <!-- RIGHT SIDE -->
        <div class="d-flex align-items-center gap-2">

            <!-- WHATSAPP -->
            <a href="https://wa.me/919031077556" target="_blank"
               class="btn btn-success btn-sm">
               💬
            </a>

            <!-- CTA -->
            <a href="{% url 'contact:contact' %}" class="btn btn-cta px-3">
                Updates
            </a>

        </div>

    </div>
</div>
</nav>

<!-- STYLE -->
<style>
.custom-navbar {
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

#navbar.scrolled {
    background: #000;
}

/* Hover Animation */
.nav-hover {
    position: relative;
}
.nav-hover::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    background: #ffc107;
    bottom: 0;
    left: 0;
    transition: 0.3s;
}
.nav-hover:hover::after {
    width: 100%;
}

/* Mega Menu Animation */
.animate-dropdown {
    animation: fadeDown 0.3s ease;
}
@keyframes fadeDown {
    from {opacity:0; transform:translateY(-10px);}
    to {opacity:1; transform:translateY(0);}
}

/* CTA Button */
.btn-cta {
    background: linear-gradient(45deg, #ff9800, #ffc107);
    border: none;
    color: black;
    font-weight: bold;
}
.btn-cta:hover {
    transform: scale(1.05);
}
</style>

<!-- SCRIPT -->
<script>
window.addEventListener("scroll", () => {
    document.getElementById("navbar")
    ?.classList.toggle("scrolled", window.scrollY > 50);
});

function toggleMode(){
   document.body.classList.toggle("dark-mode");
}
</script>
